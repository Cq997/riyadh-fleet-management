<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة القائد</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
  <h3>📊 لوحة القائد</h3>
  <a href="app.html">النظام</a>
  <button onclick="logout()">خروج</button>
</div>

<div class="main">

<h1>📊 لوحة القيادة</h1>

<div class="cards">
  <div class="card">🚑 المركبات: <span id="fleet"></span></div>
  <div class="card">🛠️ الصيانة: <span id="maintenance"></span></div>
  <div class="card">🚨 الحوادث: <span id="accidents"></span></div>
</div>

<hr>

<h2>👥 المستخدمين</h2>

<table id="usersTable"></table>

<h3>➕ إضافة مستخدم</h3>
<input id="newUser">
<input id="newPass">
<select id="newRole">
  <option>مدير</option>
  <option>مشرف</option>
  <option>الأسطول</option>
  <option>الصيانة</option>
  <option>الحوادث</option>
</select>

<button onclick="إضافة_مستخدم()">إضافة</button>

</div>

<script src="config.js"></script>

<script>

function تحديث() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=عرض";
  document.body.appendChild(s);
}

function عرض(data) {

  document.getElementById("fleet").innerText = data.fleet.length - 1;
  document.getElementById("maintenance").innerText = data.maintenance.length - 1;
  document.getElementById("accidents").innerText = data.accidents.length - 1;

  let table = document.getElementById("usersTable");
  table.innerHTML = "";

  (data.users || []).slice(1).forEach(u => {
    let row = table.insertRow();
    row.innerHTML = `<td>${u[0]}</td><td>${u[2]}</td>`;
  });
}

function إضافة_مستخدم() {

  const url = API_URL
    + "?action=addUser"
    + "&user=" + newUser.value
    + "&pass=" + newPass.value
    + "&role=" + newRole.value
    + "&callback=done";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

function done() {
  alert("تمت الإضافة");
  تحديث();
}

function logout() {
  localStorage.clear();
  location.href = "index.html";
}

setInterval(تحديث, 5000);
تحديث();

</script>

</body>
</html>
