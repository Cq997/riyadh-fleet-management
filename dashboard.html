<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة القائد</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
/* نافذة المستخدمين */
.modal {
  display: none;
  position: fixed;
  z-index: 999;
  right: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
}

.modal-content {
  background: #0b1f33;
  margin: 5% auto;
  padding: 20px;
  width: 80%;
  border-radius: 10px;
  color: white;
}

.close {
  float: left;
  cursor: pointer;
  font-size: 20px;
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>📊 لوحة القائد</h3>
  <a href="app.html">🚑 النظام</a>
  <button onclick="logout()">خروج</button>
</div>

<div class="main">

<h1>📊 غرفة عمليات الأسطول</h1>

<!-- 👇 زر إدارة المستخدمين -->
<button id="btnUsers" onclick="فتح_المستخدمين()">👥 إدارة المستخدمين</button>

<div class="cards">
  <div class="card">🚑 إجمالي المركبات: <span id="fleet"></span></div>
  <div class="card">🟢 الجاهزة: <span id="ready"></span></div>
  <div class="card">🛠️ خارج الخدمة: <span id="maintenance"></span></div>
  <div class="card">🚨 الحوادث: <span id="accidents"></span></div>
</div>

<hr>

<h2>⚠️ التنبيهات الهامة</h2>
<div id="alertsBox"></div>

</div>

<!-- 👇 نافذة المستخدمين -->
<div id="usersModal" class="modal">

  <div class="modal-content">

    <span onclick="اغلاق_المستخدمين()" class="close">✖</span>

    <h2>👥 إدارة المستخدمين</h2>

    <table id="usersTable" border="1" width="100%">
      <tr>
        <th>اسم المستخدم</th>
        <th>الصلاحية</th>
        <th>حذف</th>
      </tr>
    </table>

    <hr>

    <h3>➕ إضافة مستخدم</h3>

    <input id="newUser" placeholder="اسم المستخدم">
    <input id="newPass" placeholder="كلمة المرور">

    <select id="newRole">
      <option>مدير</option>
      <option>مشرف</option>
      <option>الأسطول</option>
      <option>الصيانة</option>
      <option>الحوادث</option>
    </select>

    <button onclick="إضافة_مستخدم()">➕ إضافة</button>

  </div>
</div>

<script src="config.js"></script>

<script>

window.onload = function() {

  const roles = (localStorage.getItem("roles") || "").split(",");

  if (!roles.includes("مدير") && !roles.includes("مشرف")) {
    alert("❌ غير مصرح");
    location.href = "index.html";
    return;
  }

  // إخفاء زر المستخدمين لغير المدير
  if (!roles.includes("مدير")) {
    document.getElementById("btnUsers").style.display = "none";
  }

  تحديث();
};

// 🔄 تحديث البيانات
function تحديث() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=عرض";
  document.body.appendChild(s);
}

// 📊 عرض البيانات
function عرض(data) {

  let fleet = data.fleet.length - 1;
  let maintenance = data.maintenance.length - 1;
  let accidents = data.accidents.length - 1;

  let ready = fleet - maintenance - accidents;

  document.getElementById("fleet").innerText = fleet;
  document.getElementById("ready").innerText = ready;
  document.getElementById("maintenance").innerText = maintenance;
  document.getElementById("accidents").innerText = accidents;

  تحليل_التنبيهات(data);
  عرض_المستخدمين(data);
}

// ⚠️ تحليل التنبيهات
function تحليل_التنبيهات(data) {

  let alerts = [];
  let oil = data.oil || [];
  let maintenance = data.maintenance || [];

  oil.slice(1).forEach(o => {
    let diff = (new Date() - new Date(o[1])) / (1000*60*60*24);
    if (diff > 25) {
      alerts.push("⛽ قرب تغيير زيت للمركبة رقم " + o[0]);
    }
  });

  let مشاكل = {};
  maintenance.slice(1).forEach(m => {
    let نوع = m[2];
    مشاكل[نوع] = (مشاكل[نوع] || 0) + 1;

    if (مشاكل[نوع] >= 3) {
      alerts.push("⚠️ تكرار عطل: " + نوع);
    }
  });

  let box = document.getElementById("alertsBox");
  box.innerHTML = alerts.length ? "" : "✅ لا توجد تنبيهات";

  alerts.forEach(a => {
    let div = document.createElement("div");
    div.className = "alert";
    div.innerText = a;
    box.appendChild(div);
  });
}

// 👥 عرض المستخدمين
function عرض_المستخدمين(data) {

  let table = document.getElementById("usersTable");

  table.innerHTML = `
    <tr>
      <th>اسم المستخدم</th>
      <th>الصلاحية</th>
      <th>حذف</th>
    </tr>
  `;

  (data.users || []).slice(1).forEach((u, i) => {

    let row = table.insertRow();

    row.innerHTML = `
      <td>${u[0]}</td>
      <td>${u[2]}</td>
      <td><button onclick="حذف_مستخدم(${i+2})">🗑️</button></td>
    `;
  });
}

// 👥 فتح النافذة
function فتح_المستخدمين() {
  document.getElementById("usersModal").style.display = "block";
}

// ❌ إغلاق
function اغلاق_المستخدمين() {
  document.getElementById("usersModal").style.display = "none";
}

// ➕ إضافة
function إضافة_مستخدم() {

  const url = API_URL
    + "?action=addUser"
    + "&user=" + encodeURIComponent(newUser.value)
    + "&pass=" + encodeURIComponent(newPass.value)
    + "&role=" + encodeURIComponent(newRole.value)
    + "&callback=done";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

// 🗑️ حذف
function حذف_مستخدم(row) {

  const url = API_URL
    + "?action=deleteUser"
    + "&row=" + row
    + "&callback=deleted";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

// callbacks
function done() {
  alert("✅ تمت الإضافة");
  تحديث();
}

function deleted() {
  alert("🗑️ تم الحذف");
  تحديث();
}

// خروج
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

setInterval(تحديث, 5000);

</script>

</body>
</html>
