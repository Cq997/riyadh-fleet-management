<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة القائد</title>

<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
.modal {
  display:none;
  position:fixed;
  z-index:999;
  right:0;
  top:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.modal-content {
  background:#0b1f33;
  margin:5% auto;
  padding:20px;
  width:80%;
  border-radius:10px;
}

.close {
  float:left;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="sidebar">
  <h3>📊 لوحة القائد</h3>
  <a href="app.html">🚑 النظام</a>
  <button onclick="logout()">خروج</button>
</div>

<div class="main">

<h1>📊 غرفة عمليات الأسطول</h1>

<button id="btnUsers" onclick="فتح_المستخدمين()">👥 إدارة المستخدمين</button>

<div class="cards">
  <div class="card">🚑 المركبات: <span id="fleet"></span></div>
  <div class="card">🟢 الجاهزة: <span id="ready"></span></div>
  <div class="card">🛠️ الصيانة: <span id="maintenance"></span></div>
  <div class="card">🚨 الحوادث: <span id="accidents"></span></div>
</div>

<hr>

<h2>⚠️ التنبيهات</h2>
<div id="alertsBox"></div>

<hr>

<h2>📊 التقارير</h2>

<select id="نوع_التقرير">
  <option value="شهري">شهري</option>
  <option value="ربع">ربع سنوي</option>
  <option value="سنوي">سنوي</option>
  <option value="مركبة">مركبة</option>
</select>

<select id="مركبة_تقرير"></select>

<button onclick="تقرير()">📄 عرض</button>
<button onclick="طباعة_التقرير_الرسمي()">📄 PDF رسمي</button>

<div id="reportBox"></div>

</div>

<!-- نافذة المستخدمين -->
<div id="usersModal" class="modal">
<div class="modal-content">

<span onclick="اغلاق_المستخدمين()" class="close">✖</span>

<h2>👥 المستخدمين</h2>

<table id="usersTable"></table>

<input id="newUser" placeholder="اسم المستخدم">
<input id="newPass" placeholder="كلمة المرور">

<select id="newRole">
<option>مدير</option>
<option>مشرف</option>
<option>الأسطول</option>
<option>الصيانة</option>
<option>الحوادث</option>
</select>

<button onclick="إضافة_مستخدم()">إضافة</button>

</div>
</div>

<script src="config.js"></script>

<script>

let DATA={};

window.onload=function(){

let roles=(localStorage.getItem("roles")||"").split(",");

if(!roles.includes("مدير")&&!roles.includes("مشرف")){
location.href="index.html";return;
}

if(!roles.includes("مدير")){
btnUsers.style.display="none";
}

تحديث();
};

function تحديث(){
let s=document.createElement("script");
s.src=API_URL+"?callback=عرض";
document.body.appendChild(s);
}

function عرض(data){

DATA=data;

let fleet=data.fleet.length-1;
let maintenance=data.maintenance.length-1;
let accidents=data.accidents.length-1;

let ready=fleet-maintenance-accidents;

fleetEl.innerText=fleet;
maintenanceEl.innerText=maintenance;
accidentsEl.innerText=accidents;
readyEl.innerText=ready;

تحميل_المركبات(data);
تحليل_التنبيهات(data);
عرض_المستخدمين(data);
}

// تنبيهات
function تحليل_التنبيهات(data){

let alerts=[];

data.oil.slice(1).forEach(o=>{
let d=(new Date()-new Date(o[1]))/86400000;
if(d>25)alerts.push("⛽ زيت قريب "+o[0]);
});

let count={};
data.maintenance.slice(1).forEach(m=>{
count[m[2]]=(count[m[2]]||0)+1;
if(count[m[2]]>=3)alerts.push("⚠️ تكرار "+m[2]);
});

alertsBox.innerHTML=alerts.join("<br>")||"لا يوجد";
}

// تحميل مركبات
function تحميل_المركبات(data){

let list=مركبة_تقرير;
list.innerHTML="";

data.fleet.slice(1).forEach(r=>{
let o=document.createElement("option");
o.value=r[0];
o.text=r[1];
list.appendChild(o);
});
}

// التقارير
function تقرير(){

let type=نوع_التقرير.value;
let car=مركبة_تقرير.value;

let maint=DATA.maintenance;
let acc=DATA.accidents;

if(type==="مركبة"){
let m=maint.filter(x=>x[0]==car).length;
let a=acc.filter(x=>x[0]==car).length;

reportBox.innerHTML=`🚑 ${car}<br>صيانة:${m}<br>حوادث:${a}`;
}
else{
let days=type==="شهري"?30:type==="ربع"?90:365;

let m=maint.filter(x=>(new Date()-new Date(x[1]))/86400000<=days).length;
let a=acc.filter(x=>(new Date()-new Date(x[1]))/86400000<=days).length;

reportBox.innerHTML=`📊 ${type}<br>صيانة:${m}<br>حوادث:${a}`;
}
}

// PDF
function طباعة_التقرير_الرسمي(){

let content=reportBox.innerHTML;

let w=window.open('');

w.document.write(`
<html dir="rtl">
<head>
<style>
body{font-family:Cairo;padding:40px}
h1{text-align:center}
</style>
</head>
<body>

<h1>هيئة الهلال الأحمر السعودي</h1>
<h2 style="text-align:center">تقرير الأسطول</h2>

${content}

</body>
</html>
`);

w.print();
}

// المستخدمين
function عرض_المستخدمين(data){

usersTable.innerHTML="";

data.users.slice(1).forEach((u,i)=>{
let r=usersTable.insertRow();
r.innerHTML=`<td>${u[0]}</td><td>${u[2]}</td><td><button onclick="حذف_مستخدم(${i+2})">🗑️</button></td>`;
});
}

function فتح_المستخدمين(){usersModal.style.display="block";}
function اغلاق_المستخدمين(){usersModal.style.display="none";}

function إضافة_مستخدم(){

let url=API_URL+"?action=addUser&user="+newUser.value+"&pass="+newPass.value+"&role="+newRole.value+"&callback=ok";

let s=document.createElement("script");
s.src=url;
document.body.appendChild(s);
}

function حذف_مستخدم(row){

let url=API_URL+"?action=deleteUser&row="+row+"&callback=ok";

let s=document.createElement("script");
s.src=url;
document.body.appendChild(s);
}

function ok(){تحديث();}

function logout(){
localStorage.clear();
location.href="index.html";
}

setInterval(تحديث,5000);

</script>

</body>
</html>
