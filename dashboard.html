<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة القائد</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
</head>

<body>

<!-- 🧭 القائمة -->
<div class="sidebar">
  <h3>📊 لوحة القائد</h3>
  <a href="app.html">🚑 النظام</a>
  <button onclick="logout()">🚪 خروج</button>
</div>

<!-- 🧑‍✈️ المحتوى -->
<div class="main">

<h1>📊 لوحة القيادة</h1>

<!-- 📊 المؤشرات -->
<div class="cards">
  <div class="card">🚑 المركبات: <span id="fleet"></span></div>
  <div class="card">🛠️ الصيانة: <span id="maintenance"></span></div>
  <div class="card">🚨 الحوادث: <span id="accidents"></span></div>
</div>

<hr>

<h2>👥 إدارة المستخدمين</h2>

<table id="usersTable" border="1" width="100%">
  <tr>
    <th>اسم المستخدم</th>
    <th>الصلاحية</th>
    <th>حذف</th>
  </tr>
</table>

<hr>

<h3>➕ إضافة مستخدم</h3>

<label for="newUser">اسم المستخدم</label>
<input id="newUser" name="newUser">

<label for="newPass">كلمة المرور</label>
<input id="newPass" name="newPass">

<label for="newRole">الصلاحية</label>
<select id="newRole" name="newRole">
  <option>مدير</option>
  <option>مشرف</option>
  <option>الأسطول</option>
  <option>الصيانة</option>
  <option>الحوادث</option>
</select>

<button onclick="إضافة_مستخدم()">➕ إضافة</button>

</div>

<script src="config.js"></script>

<script>

// 🚀 تشغيل بعد تحميل الصفحة
window.onload = function() {

  // 🔐 حماية (مدير فقط)
  const الصلاحيات = (localStorage.getItem("roles") || "").split(",");

  if (!الصلاحيات.includes("مدير")) {
    alert("❌ غير مصرح لك بالدخول");
    location.href = "index.html";
    return;
  }

  تحديث();
};

// 🔄 تحديث البيانات
function تحديث() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=عرض";
  document.body.appendChild(s);
}

// 📊 عرض البيانات
function عرض(data) {

  document.getElementById("fleet").innerText = data.fleet.length - 1;
  document.getElementById("maintenance").innerText = data.maintenance.length - 1;
  document.getElementById("accidents").innerText = data.accidents.length - 1;

  let table = document.getElementById("usersTable");

  // إعادة بناء الجدول
  table.innerHTML = `
    <tr>
      <th>اسم المستخدم</th>
      <th>الصلاحية</th>
      <th>حذف</th>
    </tr>
  `;

  (data.users || []).slice(1).forEach((u, i) => {

    let row = table.insertRow();

    row.innerHTML = `
      <td>${u[0]}</td>
      <td>${u[2]}</td>
      <td><button onclick="حذف_مستخدم(${i+2})">🗑️</button></td>
    `;
  });
}

// ➕ إضافة مستخدم
function إضافة_مستخدم() {

  const url = API_URL
    + "?action=addUser"
    + "&user=" + encodeURIComponent(document.getElementById("newUser").value)
    + "&pass=" + encodeURIComponent(document.getElementById("newPass").value)
    + "&role=" + encodeURIComponent(document.getElementById("newRole").value)
    + "&callback=done";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

// 🗑️ حذف مستخدم
function حذف_مستخدم(row) {

  const url = API_URL
    + "?action=deleteUser"
    + "&row=" + row
    + "&callback=deleted";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

// callbacks
function done() {
  alert("✅ تمت الإضافة");
  تحديث();
}

function deleted() {
  alert("🗑️ تم الحذف");
  تحديث();
}

// 🚪 خروج
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

// 🔄 تحديث تلقائي
setInterval(تحديث, 5000);

</script>

</body>
</html>
