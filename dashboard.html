<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة القائد</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
  <h3>📊 لوحة القائد</h3>
  <a href="app.html">النظام</a>
  <button onclick="logout()">خروج</button>
</div>

<div class="main">

<h1>📊 لوحة القيادة</h1>

<div class="cards">
  <div class="card">🚑 المركبات: <span id="fleet"></span></div>
  <div class="card">🛠️ الصيانة: <span id="maintenance"></span></div>
  <div class="card">🚨 الحوادث: <span id="accidents"></span></div>
</div>

</div>

<script src="config.js"></script>

<script>

// 🔐 حماية
if (localStorage.getItem("role") !== "admin") {
  location.href = "login.html";
}

function تحديث() {
  let s = document.createElement("script");
  s.src = API_URL + "?callback=عرض";
  document.body.appendChild(s);
}

function عرض(data) {
  document.getElementById("fleet").innerText = data.fleet.length - 1;
  document.getElementById("maintenance").innerText = data.maintenance.length - 1;
  document.getElementById("accidents").innerText = data.accidents.length - 1;
}

setInterval(تحديث, 5000);
تحديث();

function logout() {
  localStorage.clear();
  location.href = "login.html";
}

</script>

</body>
</html>
