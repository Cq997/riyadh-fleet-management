<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<title>تسجيل الدخول</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body class="login-page">

<div class="login-box">
  <h2>🚑 نظام تشغيل وصيانة الأسطول بمنطقة الرياض </h2>

  <input id="username" placeholder="اسم المستخدم">
  <input id="password" type="password" placeholder="كلمة المرور">

  <button onclick="login()">دخول</button>
</div>

<script src="config.js"></script>

<script>

let المستخدمين = [];

function تحميل_المستخدمين() {
  const s = document.createElement("script");
 s.src = API_URL + "?callback=استلام_المستخدمين";
  document.body.appendChild(s);
}

function استلام_المستخدمين(data) {
  المستخدمين = data.users || [];
  تم_تحميل_المستخدمين = true;
}

function login() {

  const u = document.getElementById("username").value.trim();
  const p = document.getElementById("password").value.trim();

  let user = المستخدمين.find(x => x[0] == u && x[1] == p);

  if (user) {

    localStorage.setItem("roles", user[2]);
    localStorage.setItem("user", u);

    if (user[2].includes("مدير")) {
      location.href = "dashboard.html";
    } else {
      location.href = "app.html";
    }

  } else {
    alert("❌ بيانات غير صحيحة");
  }
}

window.onload = تحميل_المستخدمين;

</script>

</body>
</html>
