<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<title>تشغيل وصيانة الاسطول بمنطقة الرياض</title>

<style>

body {font-family:Cairo;margin:0;background:#0b1e2d;color:white}

/* Sidebar */
.sidebar {
width:230px;height:100vh;position:fixed;
background:#091520;padding:20px
}

.sidebar button {
width:100%;margin:10px 0;padding:10px;
background:#122b40;border:none;color:white;
border-radius:6px;cursor:pointer
}

.main {margin-right:250px;padding:20px}

.page {display:none}

input,select,textarea {
width:100%;padding:10px;margin:5px 0;
border-radius:6px;border:none
}

.action {
background:#ff3b3b;color:white;
padding:10px;border:none;border-radius:6px;width:100%
}

.card {
background:#122b40;padding:15px;margin:10px;border-radius:10px
}

</style>

</head>

<body>

<div class="sidebar">
<h2>🚑 الأسطول</h2>

<button onclick="show('dashboard')">📊 لوحة القائد</button>
<button onclick="show('tracking')">📍 الرصد</button>
<button onclick="show('accidents')">🚨 الحوادث</button>
<button onclick="show('maintenance')">🛠️ الصيانة</button>
<button onclick="show('oil')">⛽ الزيت</button>
</div>

<div class="main">

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>📊 غرفة العمليات</h2>
<div class="card" id="stats"></div>
<div class="card" id="alerts"></div>
</div>

<!-- TRACKING -->
<div id="tracking" class="page">

<h2>📍 الرصد</h2>

<input id="t_car" placeholder="رقم المركبة">

<select id="sector" onchange="loadCenters()"></select>
<select id="center"></select>

<input id="location" placeholder="الموقع">

<select id="status">
<option>عاملة</option>
<option>خارج الخدمة</option>
</select>

<button class="action" onclick="saveTracking()">حفظ</button>

</div>

<!-- ACCIDENTS -->
<div id="accidents" class="page">

<h2>🚨 الحوادث</h2>

<input id="a_car" placeholder="رقم اللوحة">
<input id="reason" placeholder="سبب الحادث">
<input id="a_location" placeholder="الموقع">

<select id="a_status">
<option>عاملة</option>
<option>خارج الخدمة</option>
</select>

<select id="done">
<option>منجز</option>
<option>غير منجز</option>
</select>

<button class="action" onclick="saveAccident()">حفظ</button>

</div>

<!-- MAINTENANCE -->
<div id="maintenance" class="page">

<h2>🛠️ الصيانة</h2>

<input id="m_car" placeholder="رقم اللوحة">

<select id="level">
<option>خفيف</option>
<option>متوسط</option>
<option>ثقيل</option>
</select>

<input id="tech" placeholder="الفني">
<input id="parts" placeholder="قطع الغيار">
<input id="workshop" placeholder="الورشة">

<select id="m_done">
<option>منجز</option>
<option>غير منجز</option>
</select>

<button class="action" onclick="saveMaintenance()">حفظ</button>

</div>

<!-- OIL -->
<div id="oil" class="page">

<h2>⛽ تغيير الزيت</h2>

<input id="o_car" placeholder="رقم اللوحة">
<input id="km" placeholder="العداد">
<input id="request" placeholder="رقم الطلب">

<button class="action" onclick="saveOil()">حفظ</button>

</div>

</div>

<script>

// 🔥 القطاعات من ملفك (مربوطة بالكامل)
const SECTORS = {

"قطاع جنوب الرياض":["طريق الخرج","الشفا","الحائر","ديراب","الخالدية","الدار البيضاء","منفوحة","عكاظ","المنصورة","الاسكان"],
"قطاع شمال الرياض":[,"جامعة الاميرة نورة","الامانة","الرمال","الملقا","النفل","المونسية","البيان","النرجس","الصحافة"],
"قطاع شرق الرياض":["الروضة","النسيم","النسيم الغربي","الجنادرية","الحمراء","السلي","السلام","اشبيليا","السعادة","حي الملك فيصل","الخليج","النهضة","الندوة","النظيم"],
"قطاع غرب الرياض":["طويق","طويق2","نمار","عليشة","العريجاء","سلطانة","لبن","لبن الغربي","السويدي","القدية المطور","عرقة"],
"قطاع وسط الرياض":["الضباب","المصيف","الربوة","العروبة","الملز","حي الملك فهد","حي الملك عبدالله","النخيل","السليمانية","الشورى"],

"محافظة رماح":["الدغم","رماح","حفر العتش","شوية","سعد"],
"محافظة الأفلاج":["العجلية","الأفلاج"],
"محافظة الغاط":["الغاط"],
"محافظة القويعية":["الجلة وتبراك","القويعية","الرويضة","حلبان","الخاصرة"]

};

// بناء القطاعات
function buildSectors(){

sector.innerHTML="";

let internal=[],external=[];

Object.keys(SECTORS).forEach(k=>{
if(k.includes("قطاع")) internal.push(k);
else external.push(k);
});

let g1=document.createElement("optgroup");
g1.label="📍 قطاعات داخلية";

internal.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
g1.appendChild(o);
});

let g2=document.createElement("optgroup");
g2.label="🌍 قطاعات خارجية";

external.forEach(s=>{
let o=document.createElement("option");
o.value=s;o.text=s;
g2.appendChild(o);
});

sector.appendChild(g1);
sector.appendChild(g2);

loadCenters();
}

// المراكز
function loadCenters(){

center.innerHTML="";

SECTORS[sector.value].forEach(c=>{
let o=document.createElement("option");
o.value=c;o.text=c;
center.appendChild(o);
});
}

// API
const API_URL="ضع رابط السكربت هنا";

function send(url){
let s=document.createElement("script");
s.src=url;
document.body.appendChild(s);
}

// حفظ العمليات
function saveTracking(){
send(API_URL+"?action=addTracking&car="+t_car.value+"&sector="+sector.value+"&center="+center.value+"&location="+location.value+"&status="+status.value+"&callback=ok");
}

function saveAccident(){
send(API_URL+"?action=addAccident&car="+a_car.value+"&reason="+reason.value+"&location="+a_location.value+"&status="+a_status.value+"&done="+done.value+"&callback=ok");
}

function saveMaintenance(){
send(API_URL+"?action=addMaintenance&car="+m_car.value+"&level="+level.value+"&tech="+tech.value+"&parts="+parts.value+"&workshop="+workshop.value+"&done="+m_done.value+"&callback=ok");
}

function saveOil(){
send(API_URL+"?action=addOil&car="+o_car.value+"&km="+km.value+"&request="+request.value+"&callback=ok");
}

function ok(){alert("✅ تم الحفظ");}

// Dashboard
function loadDashboard(){
let s=document.createElement("script");
s.src=API_URL+"?callback=dashboard";
document.body.appendChild(s);
}

function dashboard(data){

let fleet=data.fleet.length-1;
let maint=data.maintenance.length-1;
let acc=data.accidents.length-1;

stats.innerHTML=`
🚑 المركبات: ${fleet}<br>
🛠️ الصيانة: ${maint}<br>
🚨 الحوادث: ${acc}
`;

// تنبيه الزيت
let alertsArr=[];

data.oil.slice(1).forEach(o=>{
let days=(new Date()-new Date(o[1]))/86400000;
if(days>25)alertsArr.push("⛽ تغيير زيت قريب: "+o[0]);
});

alerts.innerHTML=alertsArr.join("<br>")||"✅ لا يوجد تنبيهات";
}

// التنقل
function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

// تشغيل
buildSectors();
show("dashboard");
loadDashboard();

</script>

</body>
</html>
