<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الأسطول</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{font-family:Cairo;background:#0b1e2d;color:white;margin:0}
.sidebar{width:230px;position:fixed;height:100%;background:#091520;padding:20px}
.sidebar button{width:100%;margin:8px 0;padding:10px;background:#122b40;color:white;border:none}
.main{margin-right:250px;padding:20px}
.page{display:none}
input,select{width:100%;padding:10px;margin:5px 0;border-radius:6px;border:none}
button{background:red;color:white;padding:10px;border:none;width:100%}
</style>
</head>

<body>

<div class="sidebar">
<button onclick="show('tracking')">📍 الرصد</button>
<button onclick="show('accidents')">🚨 الحوادث</button>
<button onclick="show('maintenance')">🛠️ الصيانة</button>
<button onclick="show('oil')">⛽ الزيت</button>
</div>

<div class="main">

<!-- ================= الرصد ================= -->
<div id="tracking" class="page">

<h2>📍 الرصد</h2>

<select id="t_car" onchange="fillCar()"></select>

<input id="type" placeholder="النوع" readonly>
<input id="model" placeholder="الموديل" readonly>

<select id="sector"></select>
<select id="center"></select>

<input id="location" placeholder="موقع المركبة">

<select id="status">
<option>عاملة</option>
<option>خارج الخدمة</option>
</select>

<button onclick="saveTracking()">حفظ</button>

</div>

<!-- ================= الحوادث ================= -->
<div id="accidents" class="page">

<h2>🚨 الحوادث</h2>

<input id="date" type="date">
<input id="time" type="time">

<select id="a_car"></select>

<input id="reason" placeholder="سبب الحادث">
<input id="a_location" placeholder="موقع الحادث">

<select id="a_status">
<option>عاملة</option>
<option>خارج الخدمة</option>
</select>

<select id="a_sector"></select>

<input id="percent" placeholder="نسبة الخطأ">
<input id="caseNumber" placeholder="رقم الحادث">

<select id="report">
<option>نجم</option>
<option>المرور</option>
<option>الشرطة</option>
</select>

<select id="done">
<option>منجز</option>
<option>غير منجز</option>
</select>

<button onclick="saveAccident()">حفظ</button>

</div>

<!-- ================= الصيانة ================= -->
<div id="maintenance" class="page">

<h2>🛠️ الصيانة</h2>

<input type="date" id="m_date">

<select id="m_car" onchange="fillMaintenance()"></select>

<input id="m_type" readonly placeholder="النوع">
<input id="m_model" readonly placeholder="الموديل">

<select id="level">
<option>خفيف</option>
<option>متوسط</option>
<option>ثقيل</option>
</select>

<input id="tech" placeholder="الفني">
<input id="parts" placeholder="قطع الغيار">
<input id="workshop" placeholder="الورشة">

<select id="m_done">
<option>منجز</option>
<option>غير منجز</option>
</select>

<button onclick="saveMaintenance()">حفظ</button>

</div>

<!-- ================= الزيت ================= -->
<div id="oil" class="page">

<h2>⛽ تغيير الزيت</h2>

<select id="o_car" onchange="fillOil()"></select>

<input id="o_type" readonly>
<input id="o_model" readonly>

<input id="km" placeholder="العداد">
<input id="request" placeholder="رقم الطلب">

<input type="date" id="o_date">

<button onclick="saveOil()">حفظ</button>

</div>

</div>

<script>

const API_URL="https://script.google.com/macros/s/AKfycbxg4mpufv38fxvaSM2jxvcLUwWed4hJSTjjMCt7zT4AYG1fZTwqsrEjaeHDVBvfDrghAg/exec";

let DATA={};

function load(){
let s=document.createElement("script");
s.src=API_URL+"?callback=init";
document.body.appendChild(s);
}

function init(data){
DATA=data;
buildFleet();
}

// ================= المركبات =================
function buildFleet(){

t_car.innerHTML="";
a_car.innerHTML="";
m_car.innerHTML="";
o_car.innerHTML="";

DATA.fleet.slice(1).forEach(r=>{

let o=document.createElement("option");
o.value=r[0];
o.text=r[1];

t_car.appendChild(o.cloneNode(true));
a_car.appendChild(o.cloneNode(true));
m_car.appendChild(o.cloneNode(true));
o_car.appendChild(o.cloneNode(true));

});
}

// ================= تعبئة =================
function fillCar(){
let c=DATA.fleet.find(x=>x[0]==t_car.value);
type.value=c[3];
model.value=c[4];
}

function fillMaintenance(){
let c=DATA.fleet.find(x=>x[0]==m_car.value);
m_type.value=c[3];
m_model.value=c[4];
}

function fillOil(){
let c=DATA.fleet.find(x=>x[0]==o_car.value);
o_type.value=c[3];
o_model.value=c[4];
}

// ================= حفظ =================
function send(url){
let s=document.createElement("script");
s.src=url;
document.body.appendChild(s);
}

function saveTracking(){
send(API_URL+"?action=addTracking&car="+t_car.value+"&location="+location.value+"&status="+status.value+"&callback=ok");
}

function saveAccident(){
send(API_URL+"?action=addAccident&car="+a_car.value+"&reason="+reason.value+"&location="+a_location.value+"&status="+a_status.value+"&done="+done.value+"&callback=ok");
}

function saveMaintenance(){
send(API_URL+"?action=addMaintenance&car="+m_car.value+"&level="+level.value+"&tech="+tech.value+"&parts="+parts.value+"&workshop="+workshop.value+"&done="+m_done.value+"&callback=ok");
}

function saveOil(){
send(API_URL+"?action=addOil&car="+o_car.value+"&km="+km.value+"&request="+request.value+"&callback=ok");
}

function ok(){alert("تم الحفظ");}

// ================= تنقل =================
function show(id){
document.querySelectorAll(".page").forEach(p=>p.style.display="none");
document.getElementById(id).style.display="block";
}

show("tracking");
load();

</script>

</body>
</html>
