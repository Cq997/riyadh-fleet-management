<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <!-- 📱 التوافق -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 🎨 الخط -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

  <title>تشغيل الأسطول - الرياض</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🧭 القائمة -->
<div class="sidebar">
  <h3>🚑 النظام</h3>
  <a href="dashboard.html">📊 لوحة القائد</a>
  <a href="#">🚑 الأسطول</a>
  <a href="#">🛠️ الصيانة</a>
  <a href="#">🚨 الحوادث</a>
  <a href="#">📦 الدعم اللوجستي</a>

<!-- 🧑‍✈️ المحتوى -->
<div class="main">

  <h1>🚑 تشغيل الأسطول</h1>

  <!-- 🔍 البحث -->
  <input type="text" placeholder="بحث برقم أو حرف" onkeyup="بحث_مركبة(this.value)">

  <!-- 🚑 اختيار المركبة -->
  <select id="قائمة_المركبات" onchange="تعبئة_المركبة()"></select>

  <hr>

  <!-- 📋 بيانات المركبة -->
  <input id="رقم_اللوحة" placeholder="رقم اللوحة">
  <input id="الحروف" placeholder="الحروف">
  <input id="النوع" placeholder="النوع">
  <input id="الموديل" placeholder="الموديل">
  <input id="الشاصي" placeholder="رقم الشاصي">
  <input id="العداد" placeholder="العداد">

  <!-- ⛽ الزيت -->
  <input id="آخر_تغيير_زيت" placeholder="آخر تغيير زيت" readonly>

</div>

<!-- 🔌 الربط -->
<script src="config.js"></script>

<!-- ⚙️ النظام -->
