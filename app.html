<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<title>تشغيل الأسطول</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🧭 القائمة -->
<div class="sidebar">
  <h3>🚑 النظام</h3>
  <a href="dashboard.html">📊 لوحة القائد</a>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<!-- 🧑‍✈️ المحتوى -->
<div class="main">

<h1>🚑 تشغيل الأسطول</h1>

<label for="search">بحث</label>
<input id="search" name="search" placeholder="بحث" onkeyup="بحث_مركبة(this.value)">

<label for="قائمة_المركبات">المركبات</label>
<select id="قائمة_المركبات" onchange="تعبئة_المركبة()"></select>

<hr>

<label for="رقم_اللوحة">رقم اللوحة</label>
<input id="رقم_اللوحة" name="رقم_اللوحة">

<label for="الحروف">الحروف</label>
<input id="الحروف" name="الحروف">

<label for="النوع">النوع</label>
<input id="النوع" name="النوع">

<label for="الموديل">الموديل</label>
<input id="الموديل" name="الموديل">

<label for="الشاصي">الشاصي</label>
<input id="الشاصي" name="الشاصي">

<label for="العداد">العداد</label>
<input id="العداد" name="العداد">

<label for="آخر_تغيير_زيت">آخر تغيير زيت</label>
<input id="آخر_تغيير_زيت" name="آخر_تغيير_زيت" readonly>

<hr>

<h3>🛠️ إضافة صيانة</h3>

<label for="رقم_المركبة_صيانة">رقم المركبة</label>
<input id="رقم_المركبة_صيانة" name="رقم_المركبة_صيانة">

<label for="نوع_الصيانة">نوع الصيانة</label>
<input id="نوع_الصيانة" name="نوع_الصيانة">

<button id="btnMaintenance" onclick="حفظ_صيانة()">💾 حفظ</button>

</div>

<script src="config.js"></script>

<script>

// 🚀 تشغيل بعد تحميل الصفحة
window.onload = function() {

  // 🔐 الصلاحيات
  const الصلاحيات = (localStorage.getItem("roles") || "").split(",");

  // ❌ منع الدخول
  if (
    !الصلاحيات.includes("الأسطول") &&
    !الصلاحيات.includes("مدير") &&
    !الصلاحيات.includes("مشرف")
  ) {
    location.href = "index.html";
    return;
  }

  // 🔒 إخفاء زر الصيانة
  if (!الصلاحيات.includes("الصيانة") && !الصلاحيات.includes("مدير")) {
    document.getElementById("btnMaintenance").style.display = "none";
  }

  تحميل_البيانات();
};

// البيانات
let بيانات_المركبات = [];
let بيانات_الزيت = [];

// تحميل البيانات
function تحميل_البيانات() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=استلام_بيانات";
  document.body.appendChild(s);
}

// استلام
function استلام_بيانات(data) {
  بيانات_المركبات = data.fleet || [];
  بيانات_الزيت = data.oil || [];
  تحميل_القائمة();
}

// القائمة
function تحميل_القائمة() {
  let list = document.getElementById("قائمة_المركبات");
  list.innerHTML = "";

  بيانات_المركبات.slice(1).forEach(r => {
    let o = document.createElement("option");
    o.value = r[0];
    o.text = r[1] + " - " + r[3];
    list.appendChild(o);
  });
}

// تعبئة
function تعبئة_المركبة() {
  let id = document.getElementById("قائمة_المركبات").value;
  let m = بيانات_المركبات.find(x => x[0] == id);

  if (!m) return;

  document.getElementById("رقم_اللوحة").value = m[1];
  document.getElementById("الحروف").value = m[2];
  document.getElementById("النوع").value = m[3];
  document.getElementById("الموديل").value = m[4];
  document.getElementById("الشاصي").value = m[5];
  document.getElementById("العداد").value = m[6];
}

// بحث
function بحث_مركبة(v) {
  let list = document.getElementById("قائمة_المركبات");
  list.innerHTML = "";

  بيانات_المركبات.slice(1).forEach(r => {
    if (r.join(" ").includes(v)) {
      let o = document.createElement("option");
      o.value = r[0];
      o.text = r[1] + " - " + r[3];
      list.appendChild(o);
    }
  });
}

// حفظ صيانة
function حفظ_صيانة() {

  const الصلاحيات = (localStorage.getItem("roles") || "").split(",");

  if (!الصلاحيات.includes("الصيانة") && !الصلاحيات.includes("مدير")) {
    alert("❌ لا تملك صلاحية");
    return;
  }

  const url = API_URL 
    + "?action=addMaintenance"
    + "&car=" + document.getElementById("رقم_المركبة_صيانة").value
    + "&type=" + document.getElementById("نوع_الصيانة").value
    + "&callback=تم";

  const s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

function تم() {
  alert("✅ تم الحفظ");
}

// خروج
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

</script>

</body>
</html>
