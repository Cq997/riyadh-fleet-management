<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<title>تشغيل الأسطول</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- 🧭 القائمة -->
<div class="sidebar">
  <h3>🚑 النظام</h3>
  <a href="dashboard.html">📊 لوحة القائد</a>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<!-- 🧑‍✈️ المحتوى -->
<div class="main">

<h1>🚑 تشغيل الأسطول</h1>

<!-- 🔍 بحث -->
<input type="text" placeholder="بحث برقم أو حرف" onkeyup="بحث_مركبة(this.value)">

<!-- 🚑 اختيار -->
<select id="قائمة_المركبات" onchange="تعبئة_المركبة()"></select>

<hr>

<!-- 📋 بيانات المركبة -->
<input id="رقم_اللوحة" placeholder="رقم اللوحة">
<input id="الحروف" placeholder="الحروف">
<input id="النوع" placeholder="النوع">
<input id="الموديل" placeholder="الموديل">
<input id="الشاصي" placeholder="رقم الشاصي">
<input id="العداد" placeholder="العداد">
<input id="آخر_تغيير_زيت" placeholder="آخر تغيير زيت" readonly>

<hr>

<!-- 🛠️ صيانة -->
<h3>إضافة صيانة</h3>
<input id="رقم_المركبة_صيانة" placeholder="رقم المركبة">
<input id="نوع_الصيانة" placeholder="نوع الصيانة">

<button onclick="حفظ_صيانة()">💾 حفظ</button>

</div>

<!-- 🔌 الربط -->
<script src="config.js"></script>

<script>

// 🔐 حماية (تم التعديل)
if (localStorage.getItem("role") !== "operator") {
  location.href = "index.html";
}

// 🧠 متغيرات
let بيانات_المركبات = [];
let بيانات_الزيت = [];

// 🔄 تحميل البيانات (JSONP)
function تحميل_البيانات() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=استلام";
  document.body.appendChild(s);
}

// 📥 استلام البيانات
function استلام(data) {
  بيانات_المركبات = data.fleet || [];
  بيانات_الزيت = data.oil || [];
  تحميل_القائمة();
}

// 📋 قائمة المركبات
function تحميل_القائمة() {
  let list = document.getElementById("قائمة_المركبات");
  list.innerHTML = "";

  بيانات_المركبات.slice(1).forEach(r => {
    let o = document.createElement("option");
    o.value = r[0];
    o.text = r[1] + " - " + r[3];
    list.appendChild(o);
  });
}

// 🚑 تعبئة البيانات
function تعبئة_المركبة() {
  let id = document.getElementById("قائمة_المركبات").value;
  let m = بيانات_المركبات.find(x => x[0] == id);

  if (!m) return;

  document.getElementById("رقم_اللوحة").value = m[1];
  document.getElementById("الحروف").value = m[2];
  document.getElementById("النوع").value = m[3];
  document.getElementById("الموديل").value = m[4];
  document.getElementById("الشاصي").value = m[5];
  document.getElementById("العداد").value = m[6];

  // ⛽ آخر تغيير زيت
  let z = بيانات_الزيت.find(o => o[0] == id);
  if (z) {
    document.getElementById("آخر_تغيير_زيت").value = z[1];
  }
}

// 🔍 بحث
function بحث_مركبة(v) {
  let list = document.getElementById("قائمة_المركبات");
  list.innerHTML = "";

  بيانات_المركبات.slice(1).forEach(r => {
    if (r.join(" ").includes(v)) {
      let o = document.createElement("option");
      o.value = r[0];
      o.text = r[1] + " - " + r[3];
      list.appendChild(o);
    }
  });
}

// 💾 حفظ صيانة
function حفظ_صيانة() {

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      sheet: "الصيانة",
      values: [
        document.getElementById("رقم_المركبة_صيانة").value,
        new Date().toLocaleString(),
        document.getElementById("نوع_الصيانة").value
      ]
    })
  });

  alert("✅ تم حفظ الصيانة");
}

// 🚪 تسجيل خروج (تم التعديل)
function logout() {
  localStorage.clear();
  location.href = "index.html";
}

// 🚀 تشغيل
window.onload = تحميل_البيانات;

</script>

</body>
</html>
