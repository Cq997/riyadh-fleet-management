<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<title>تشغيل الأسطول</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="sidebar">
  <h3>🚑 النظام</h3>
  <a href="dashboard.html">📊 لوحة القائد</a>
  <button onclick="logout()">خروج</button>
</div>

<div class="main">

<h1>🚑 تشغيل وصيانة الأسطول</h1>

<label>اختيار المركبة</label>
<select id="carSelect"></select>

<label>نوع الصيانة</label>
<input id="type">

<label>ملاحظات</label>
<textarea id="note"></textarea>

<button onclick="saveMaintenance()">💾 تسجيل صيانة</button>
<button onclick="returnService()">🟢 إرجاع للخدمة</button>

</div>

<script src="config.js"></script>

<script>

let fleetData = [];

window.onload = function() {
  loadData();
};

function loadData() {
  const s = document.createElement("script");
  s.src = API_URL + "?callback=loadApp";
  document.body.appendChild(s);
}

function loadApp(data) {

  fleetData = data.fleet || [];

  let list = document.getElementById("carSelect");
  list.innerHTML = "";

  fleetData.slice(1).forEach(r => {
    let o = document.createElement("option");
    o.value = r[0];
    o.text = r[1] + " - " + r[3];
    list.appendChild(o);
  });
}

// 🛠️ صيانة
function saveMaintenance() {

  const url = API_URL 
    + "?action=addMaintenance"
    + "&car=" + carSelect.value
    + "&type=" + type.value
    + "&note=" + encodeURIComponent(note.value)
    + "&callback=done";

  let s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

// 🟢 جاهزية
function returnService() {

  const url = API_URL 
    + "?action=returnToService"
    + "&car=" + carSelect.value
    + "&callback=done";

  let s = document.createElement("script");
  s.src = url;
  document.body.appendChild(s);
}

function done() {
  alert("✅ تم التنفيذ");
}

function logout() {
  localStorage.clear();
  location.href = "index.html";
}

</script>

</body>
</html>
